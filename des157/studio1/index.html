<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Mad Libs!</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Carter+One&family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Mad Libs 2.0</h1>
    </header>

    <main>
        <p class="instructions">Follow the instructions to fill out the fields to the right, and then build your very own custom story!</p>
        <div class="card">
            <form>
                <h2>Let's play!</h2>
    
                <label for="adjective">Enter an adjective:</label>
                <input type="text" name="adjective" id="adjective" required>
    
                <label for="adverb">Enter an adverb:</label>
                <input type="text" name="adverb" id="adverb" required>
    
                <label for="person">Enter an person's name:</label>
                <input type="text" name="person" id="person" required>
    
                <label for="verb">Enter an verb:</label>
                <input type="text" name="verb" id="verb" required>
        
                <label for="noun">Enter a noun:</label>
                <input type="text" name="noun" id="noun" required>
        
                <input type="submit" value="Build your story!" id="submit">
            </form>
    
            <div class="story hide">
                <h2>Tillydrone Rainforest</h2>
                <p></p>
                <a href="">Play again</a>
            </div>
        </div>
    </main>




</body>
</html>
